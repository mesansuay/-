<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบประเมินราคาสิ่งพิมพ์</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Kanit', sans-serif; }
        .step-inactive { display: none; }
    </style>
</head>
<body class="bg-slate-100 min-h-screen">

    <div class="max-w-xl mx-auto bg-white shadow-2xl min-h-screen md:min-h-fit md:my-10 md:rounded-3xl overflow-hidden">
        <div class="bg-gradient-to-r from-blue-700 to-indigo-800 p-8 text-white text-center">
            <h1 class="text-2xl font-bold">ระบบขอใบเสนอราคาสิ่งพิมพ์</h1>
            <p class="text-blue-100 text-sm mt-1 opacity-80">คำนวณราคาแม่นยำ อ้างอิงระบบ Digital & Offset</p>
        </div>

        <div class="flex justify-between px-6 py-4 bg-white border-b overflow-x-auto">
            <div class="step-dot flex flex-col items-center min-w-[80px]" id="dot1">
                <span class="w-8 h-8 rounded-full bg-blue-600 text-white flex items-center justify-center text-sm mb-1">1</span>
                <span class="text-[10px] text-blue-600 font-medium text-center">ผลิตภัณฑ์/<br>งานออกแบบ</span>
            </div>
            <div class="step-dot flex flex-col items-center min-w-[80px] opacity-30" id="dot2">
                <span class="w-8 h-8 rounded-full bg-gray-300 text-white flex items-center justify-center text-sm mb-1">2</span>
                <span class="text-[10px] text-gray-500 text-center">สเปกวัสดุ</span>
            </div>
            <div class="step-dot flex flex-col items-center min-w-[80px] opacity-30" id="dot3">
                <span class="w-8 h-8 rounded-full bg-gray-300 text-white flex items-center justify-center text-sm mb-1">3</span>
                <span class="text-[10px] text-gray-500 text-center">งานหลังพิมพ์</span>
            </div>
            <div class="step-dot flex flex-col items-center min-w-[80px] opacity-30" id="dot4">
                <span class="w-8 h-8 rounded-full bg-gray-300 text-white flex items-center justify-center text-sm mb-1">4</span>
                <span class="text-[10px] text-gray-500 text-center">สรุปข้อมูล</span>
            </div>
        </div>

        <form id="multiStepForm" class="p-6">
            
            <div id="step1" class="step-content space-y-5">
                <div class="bg-blue-50 p-4 rounded-xl border border-blue-100">
                    <label class="block text-sm font-semibold text-blue-900 mb-3">🎨 ไฟล์งาน / บริการออกแบบ</label>
                    <div class="space-y-2">
                        <label class="flex items-center p-3 bg-white rounded-lg border border-blue-200 cursor-pointer shadow-sm">
                            <input type="radio" name="designService" value="มีไฟล์พร้อมพิมพ์" checked class="w-4 h-4 text-blue-600">
                            <span class="ml-3 text-sm text-gray-700 font-medium">มีไฟล์พร้อมพิมพ์ (AI, PDF, JPG)</span>
                        </label>
                        <label class="flex items-center p-3 bg-white rounded-lg border border-blue-200 cursor-pointer shadow-sm">
                            <input type="radio" name="designService" value="ต้องการให้ออกแบบใหม่" class="w-4 h-4 text-blue-600">
                            <span class="ml-3 text-sm text-gray-700 font-medium">ต้องการให้ออกแบบใหม่ทั้งหมด</span>
                        </label>
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">ประเภทงานพิมพ์</label>
                    <select id="workType" onchange="togglePageInput()" class="w-full rounded-xl border-gray-300 border p-3 focus:ring-2 focus:ring-blue-500 transition-all" required>
                        <option value="หนังสือ">หนังสือ/วารสาร</option>
                        <option value="แผ่นพับ">แผ่นพับ/ใบปลิว</option>
                        <option value="นามบัตร">นามบัตร</option>
                        <option value="กล่อง">กล่องบรรจุภัณฑ์</option>
                        <option value="สติกเกอร์">สติกเกอร์</option>
                    </select>
                </div>

                <div id="pageInput" class="animate-pulse shadow-inner bg-gray-50 p-3 rounded-lg">
                    <label class="block text-sm font-medium text-gray-700 mb-1">จำนวนหน้าเนื้อใน (เฉพาะงานเล่ม)</label>
                    <input type="number" id="pages" placeholder="เช่น 60" class="w-full rounded-lg border-gray-300 border p-3">
                </div>
            </div>

            <div id="step2" class="step-content step-inactive space-y-4">
                <div class="grid grid-cols-2 gap-4">
                    <div class="col-span-2">
                        <label class="block text-sm font-medium text-gray-700 mb-1">ชนิดกระดาษ / วัสดุ</label>
                        <select id="paper" class="w-full rounded-xl border-gray-300 border p-3">
                            <option>ปอนด์ขาว 80g</option>
                            <option>อาร์ตมัน 105g</option>
                            <option>อาร์ตมัน 130g</option>
                            <option>อาร์ตการ์ด 260g</option>
                            <option>สติกเกอร์ขาวเงา</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">ขนาดงาน (กางออก)</label>
                        <select id="size" class="w-full rounded-xl border-gray-300 border p-3">
                            <option>A4 (21 x 29.7 cm)</option>
                            <option>A5 (14.8 x 21 cm)</option>
                            <option>A3 (29.7 x 42 cm)</option>
                            <option>ขนาดกำหนดเอง (ระบุในหมายเหตุ)</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">จำนวนสั่งผลิต</label>
                        <input type="number" id="quantity" placeholder="100" class="w-full rounded-xl border-gray-300 border p-3">
                    </div>
                </div>
            </div>

            <div id="step3" class="step-content step-inactive space-y-4">
                <label class="block text-sm font-medium text-gray-700 mb-2">เทคนิคพิเศษและการเข้าเล่ม</label>
                <div class="grid grid-cols-2 gap-3">
                    <label class="flex items-center p-3 border rounded-xl hover:bg-slate-50"><input type="checkbox" name="finish" value="เคลือบเงา" class="w-4 h-4"> <span class="ml-2 text-sm">เคลือบเงา</span></label>
                    <label class="flex items-center p-3 border rounded-xl hover:bg-slate-50"><input type="checkbox" name="finish" value="เคลือบด้าน" class="w-4 h-4"> <span class="ml-2 text-sm">เคลือบด้าน</span></label>
                    <label class="flex items-center p-3 border rounded-xl hover:bg-slate-50"><input type="checkbox" name="finish" value="Spot UV" class="w-4 h-4"> <span class="ml-2 text-sm">Spot UV</span></label>
                    <label class="flex items-center p-3 border rounded-xl hover:bg-slate-50"><input type="checkbox" name="finish" value="ปั๊มนูน" class="w-4 h-4"> <span class="ml-2 text-sm">ปั๊มนูน</span></label>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mt-4 mb-1">การเข้าเล่ม</label>
                    <select id="binding" class="w-full rounded-xl border-gray-300 border p-3">
                        <option>ไม่มี</option>
                        <option>ไสกาว (แนะนำ 60 หน้าขึ้นไป)</option>
                        <option>เย็บมุงหลังคา</option>
                        <option>พับครึ่ง / พับ 3 ตอน</option>
                    </select>
                </div>
            </div>

            <div id="step4" class="step-content step-inactive">
                <div class="bg-gray-50 p-5 rounded-2xl border-2 border-dashed border-gray-200">
                    <h3 class="font-bold text-gray-800 border-b pb-2 mb-3">📋 ตรวจสอบสเปกของคุณ</h3>
                    <div id="summaryContent" class="space-y-2 text-sm text-gray-600">
                        </div>
                </div>
                <p class="text-[10px] text-gray-400 mt-4 text-center">* เมื่อกดส่ง ข้อมูลจะถูกส่งเข้าห้องแชทของเจ้าหน้าที่ทันที</p>
            </div>

            <div class="flex gap-3 mt-8">
                <button type="button" id="prevBtn" onclick="nextPrev(-1)" class="flex-1 py-4 px-6 bg-gray-100 text-gray-500 rounded-2xl font-bold hidden hover:bg-gray-200 transition-all">← ย้อนกลับ</button>
                <button type="button" id="nextBtn" onclick="nextPrev(1)" class="flex-[2] py-4 px-6 bg-blue-600 text-white rounded-2xl font-bold shadow-lg shadow-blue-200 hover:bg-blue-700 transition-all text-center">ถัดไป →</button>
            </div>
        </form>
    </div>

    <script>
        // --- ใส่ LIFF ID ของคุณที่นี่ ---
        const MY_LIFF_ID = "YOUR_LIFF_ID"; 

        let currentStep = 1;

        async function initLiff() {
            try {
                await liff.init({ liffId: MY_LIFF_ID });
                if (!liff.isLoggedIn()) liff.login();
            } catch (err) { console.error(err); }
        }
        initLiff();

        function togglePageInput() {
            const type = document.getElementById('workType').value;
            const pInput = document.getElementById('pageInput');
            pInput.style.display = (type === 'หนังสือ') ? 'block' : 'none';
        }

        function nextPrev(n) {
            const steps = document.getElementsByClassName("step-content");
            
            // ตรวจสอบการกรอกข้อมูลก่อนไปขั้นตอนถัดไป (Basic Validation)
            if (n == 1 && currentStep == 1 && !document.getElementById('workType').value) return false;

            steps[currentStep - 1].classList.add("step-inactive");
            currentStep += n;

            if (currentStep > steps.length) {
                submitFinalData();
                return false;
            }
            
            showStep(currentStep);
        }

        function showStep(n) {
            const steps = document.getElementsByClassName("step-content");
            steps[n - 1].classList.remove("step-inactive");
            
            // ปรับปุ่ม ย้อนกลับ/ถัดไป
            document.getElementById("prevBtn").style.display = (n == 1) ? "none" : "inline";
            if (n == steps.length) {
                document.getElementById("nextBtn").innerText = "ส่งข้อมูลประเมินราคา";
                document.getElementById("nextBtn").classList.replace("bg-blue-600", "bg-green-600");
                updateSummary();
            } else {
                document.getElementById("nextBtn").innerText = "ถัดไป →";
                document.getElementById("nextBtn").classList.replace("bg-green-600", "bg-blue-600");
            }

            // อัปเดต Stepper Dots
            for(let i=1; i<=4; i++) {
                const dot = document.getElementById("dot" + i);
                if(i <= n) {
                    dot.classList.remove("opacity-30");
                    dot.querySelector('span:first-child').classList.replace("bg-gray-300", "bg-blue-600");
                } else {
                    dot.classList.add("opacity-30");
                    dot.querySelector('span:first-child').classList.replace("bg-blue-600", "bg-gray-300");
                }
            }
        }

        function updateSummary() {
            const design = document.querySelector('input[name="designService"]:checked').value;
            const type = document.getElementById('workType').value;
            const summary = document.getElementById('summaryContent');
            summary.innerHTML = `
                <p><b>บริการ:</b> ${design}</p>
                <p><b>งาน:</b> ${type}</p>
                <p><b>สเปก:</b> ${document.getElementById('paper').value} | ${document.getElementById('size').value}</p>
                <p><b>จำนวนสั่ง:</b> ${document.getElementById('quantity').value} ชุด</p>
            `;
        }

        async function submitFinalData() {
            const btn = document.getElementById('nextBtn');
            btn.disabled = true;
            btn.innerText = "กำลังส่ง...";

            const design = document.querySelector('input[name="designService"]:checked').value;
            const type = document.getElementById('workType').value;
            const size = document.getElementById('size').value;
            const paper = document.getElementById('paper').value;
            const qty = document.getElementById('quantity').value;
            const pages = document.getElementById('pages').value || "-";
            const binding = document.getElementById('binding').value;

            const finishes = [];
            document.querySelectorAll('input[name="finish"]:checked').forEach(c => finishes.push(c.value));

            const textMsg = `🛎 *ขอใบเสนอราคาใหม่*\n` +
                            `------------------\n` +
                            `🎨 งานออกแบบ: ${design}\n` +
                            `📌 ประเภท: ${type}\n` +
                            `📏 ขนาด: ${size}\n` +
                            `📄 จำนวน: ${pages} หน้า / ${qty} ชุด\n` +
                            `📝 วัสดุ: ${paper}\n` +
                            `✨ เทคนิค: ${finishes.join(', ') || 'ไม่มี'}\n` +
                            `📖 การเข้าเล่ม: ${binding}`;

            try {
                await liff.sendMessages([{ type: 'text', text: textMsg }]);
                liff.closeWindow();
            } catch (err) {
                alert("เกิดข้อผิดพลาด: " + err.message);
                btn.disabled = false;
            }
        }
        
        // Initial call
        togglePageInput();
    </script>
</body>
</html>
