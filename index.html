<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบขอใบเสนอราคา - โรงพิมพ์ ss</title>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        body { font-family: sans-serif; padding: 20px; background-color: #f4f7f6; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input, textarea { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background-color: #00b900; color: white; border: none; border-radius: 4px; font-size: 16px; cursor: pointer; }
        button:disabled { background-color: #ccc; }
    </style>
</head>
<body>

    <h2>📝 ส่งข้อมูลขอใบเสนอราคา</h2>
    
    <div class="form-group">
        <label>ชื่อลูกค้า / ชื่อบริษัท</label>
        <input type="text" id="customer_name" placeholder="ระบุชื่อผู้ติดต่อ">
    </div>

    <div class="form-group">
        <label>รายละเอียดงานที่ต้องการสั่ง</label>
        <textarea id="job_desc" rows="3" placeholder="เช่น พิมพ์สติ๊กเกอร์ 500 ดวง, นามบัตร 2 กล่อง"></textarea>
    </div>

    <div class="form-group">
        <label>งบประมาณเบื้องต้น (ถ้ามี)</label>
        <input type="number" id="total_price" placeholder="0.00">
    </div>

    <button id="btnSubmit" onclick="sendData()">ส่งข้อมูลให้โรงพิมพ์</button>

    <script>
        // 1. ใส่ Webhook URL จาก n8n ของน้อง (พี่แก้ให้แล้วตามรูป Notepad)
        const N8N_WEBHOOK_URL = 'https://n8n.jack-toy.xyz/webhook-test/liff-to-airtable';

        async function main() {
            // 2. ใส่ LIFF ID (พี่แก้ให้แล้วตามรูป Notepad)
            await liff.init({ liffId: "2009294767-z0YCuxJZ" });
            if (!liff.isLoggedIn()) {
                liff.login();
            }
        }
        main();

        async function sendData() {
            const btn = document.getElementById('btnSubmit');
            const customer = document.getElementById('customer_name').value;
            
            if (!customer) {
                alert('กรุณากรอกชื่อลูกค้าด้วยครับ');
                return;
            }

            btn.disabled = true;
            btn.innerText = 'กำลังส่งข้อมูล...';

            const payload = {
                customer_name: customer,
                job_desc: document.getElementById('job_desc').value,
                total_price: document.getElementById('total_price').value,
                line_userId: (await liff.getProfile()).userId 
            };

            try {
                const response = await fetch(N8N_WEBHOOK_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                if (response.ok) {
                    alert('ส่งข้อมูลเรียบร้อย! รอรับใบเสนอราคาใน Line ได้เลยครับ');
                    liff.closeWindow(); 
                } else {
                    alert('เกิดข้อผิดพลาดในการส่งข้อมูลไปยัง n8n');
                }
            } catch (error) {
                console.error(error);
                alert('เชื่อมต่อระบบไม่ได้ กรุณาลองใหม่ครับ');
            } finally {
                btn.disabled = false;
                btn.innerText = 'ส่งข้อมูลให้โรงพิมพ์';
            }
        }
    </script>
</body>
</html>
