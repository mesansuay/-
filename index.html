<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ใบเสนอราคา - โรงพิมพ์อัจฉริยะ</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; font-family: 'Sarabun', sans-serif; }
        .card { border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .btn-primary { background-color: #00b900; border: none; } /* สี Line */
        .btn-primary:hover { background-color: #009900; }
        .hidden-section { display: none; }
    </style>
</head>
<body>
    <div class="container py-4">
        <div class="card p-4">
            <h4 class="text-center mb-4">📝 ขอใบเสนอราคาด่วน</h4>
            
            <form id="printingForm">
                <div class="mb-3">
                    <label class="form-label">ชื่อผู้ติดต่อ / บริษัท</label>
                    <input type="text" class="form-control" id="customerName" placeholder="ระบุชื่อของคุณ" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">ประเภทงานที่ต้องการ</label>
                    <select class="form-select" id="workType" onchange="updateFields()" required>
                        <option value="">-- กรุณาเลือกประเภทงาน --</option>
                        <option value="book">หนังสือ / วารสาร / คู่มือ</option>
                        <option value="flyer">โบรชัวร์ / ใบปลิว / แผ่นพับ</option>
                        <option value="sticker">สติ๊กเกอร์ / ฉลากสินค้า</option>
                        <option value="business_card">นามบัตร / การ์ดเชิญ</option>
                        <option value="box">กล่องบรรจุภัณฑ์ / ถุงกระดาษ</option>
                    </select>
                </div>

                <div id="dynamicFields" class="bg-light p-3 rounded mb-3">
                    <p class="text-muted text-center">กรุณาเลือกประเภทงานก่อนเพื่อระบุสเปก</p>
                </div>

                <div class="row">
                    <div class="col-6 mb-3">
                        <label class="form-label">จำนวนที่สั่ง (ชุด/ชิ้น)</label>
                        <input type="number" class="form-control" id="quantity" min="1" required>
                    </div>
                    <div class="col-6 mb-3">
                        <label class="form-label">วันที่ต้องการรับงาน</label>
                        <input type="date" class="form-control" id="dueDate">
                    </div>
                </div>

                <div class="mb-3">
                    <label class="form-label">หมายเหตุเพิ่มเติม (ถ้ามี)</label>
                    <textarea class="form-control" id="note" rows="2"></textarea>
                </div>

                <button type="submit" class="btn btn-primary w-100 py-2">🚀 ส่งข้อมูลให้โรงพิมพ์</button>
            </form>
        </div>
    </div>

    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <script>
        function updateFields() {
            const workType = document.getElementById('workType').value;
            const container = document.getElementById('dynamicFields');
            let html = '';

            if (workType === 'book') {
                html = `
                    <div class="mb-2"><label>จำนวนหน้าเนื้อใน:</label><input type="number" class="form-control" id="pages"></div>
                    <div class="mb-2"><label>การเข้าเล่ม:</label>
                        <select class="form-select" id="binding"><option>ไสสันทากาว</option><option>เย็บมุงหลังคา</option></select>
                    </div>`;
            } else if (workType === 'sticker') {
                html = `
                    <div class="mb-2"><label>รูปทรง:</label>
                        <select class="form-select" id="shape"><option>วงกลม</option><option>สี่เหลี่ยม</option><option>ตามรูปทรง (Die-cut)</option></select>
                    </div>
                    <div class="mb-2"><label>ขนาดกว้าง x ยาว (ซม.):</label><input type="text" class="form-control" id="size" placeholder="เช่น 5x5"></div>`;
            } else if (workType === 'flyer' || workType === 'business_card') {
                html = `
                    <div class="mb-2"><label>ขนาดงาน:</label>
                        <select class="form-select" id="paperSize"><option>A4</option><option>A5</option><option>9x5.5 cm (นามบัตร)</option></select>
                    </div>
                    <div class="mb-2"><label>การเคลือบ:</label>
                        <select class="form-select" id="coating"><option>ไม่เคลือบ</option><option>PVC เงา</option><option>PVC ด้าน</option></select>
                    </div>`;
            } else if (workType === 'box') {
                html = `
                    <div class="mb-2"><label>ประเภทกระดาษ:</label><input type="text" class="form-control" id="boxPaper" placeholder="เช่น อาร์ตการ์ด 350 แกรม"></div>
                    <div class="mb-2"><label>เทคนิคพิเศษ:</label><input type="text" class="form-control" id="special" placeholder="เช่น ปั๊มทอง, Spot UV"></div>`;
            }
            container.innerHTML = html || '<p class="text-muted text-center">กรุณาเลือกประเภทงานก่อนเพื่อระบุสเปก</p>';
        }

        // เชื่อมต่อ LIFF เพื่อส่งค่ากลับไปที่ n8n ผ่านห้องแชท
        async function main() {
            await liff.init({ liffId: "ใส่_LIFF_ID_ของน้องที่นี่" });
            if (!liff.isLoggedIn()) { liff.login(); }
        }
        main();

        document.getElementById('printingForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const data = {
                customer: document.getElementById('customerName').value,
                type: document.getElementById('workType').value,
                qty: document.getElementById('quantity').value,
                note: document.getElementById('note').value
                // เพิ่มรายละเอียดอื่นๆ ตาม dynamicFields
            };
            
            liff.sendMessages([{
                type: 'text',
                text: `[ขอใบเสนอราคา]\nประเภท: ${data.type}\nจำนวน: ${data.qty}\nข้อมูล: ${data.note}`
            }]).then(() => {
                liff.closeWindow();
            });
        });
    </script>
</body>
</html>
