<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ประเมินราคาสิ่งพิมพ์ - Print Estimator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Kanit', sans-serif; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen pb-10">

    <div class="max-w-md mx-auto bg-white shadow-lg min-h-screen md:min-h-fit md:mt-5 md:rounded-xl overflow-hidden">
        <div class="bg-indigo-600 p-6 text-white text-center">
            <h1 class="text-2xl font-bold">ขอใบเสนอราคา</h1>
            <p class="text-indigo-100 text-sm">กรอกรายละเอียดงานพิมพ์ของคุณด้านล่าง</p>
        </div>

        <form id="orderForm" class="p-6 space-y-6">
            
            <section>
                <h2 class="text-lg font-semibold text-gray-800 border-l-4 border-indigo-500 pl-2 mb-4">1. ข้อมูลงานพิมพ์</h2>
                <div class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700">ประเภทงาน</label>
                        <select id="workType" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 border p-2" required>
                            <option value="">เลือกประเภทงาน</option>
                            <option value="หนังสือ">หนังสือ/วารสาร</option>
                            <option value="แผ่นพับ">แผ่นพับ/ใบปลิว</option>
                            <option value="นามบัตร">นามบัตร</option>
                            <option value="กล่อง">กล่องบรรจุภัณฑ์</option>
                            <option value="สติกเกอร์">สติกเกอร์</option>
                        </select>
                    </div>

                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm font-medium text-gray-700">ขนาดกว้าง x ยาว</label>
                            <input type="text" id="size" placeholder="เช่น 21x29.7" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm border p-2" required>
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700">หน่วย</label>
                            <select id="unit" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm border p-2">
                                <option value="ซม.">ซม. (cm)</option>
                                <option value="นิ้ว">นิ้ว (inch)</option>
                                <option value="มม.">มม. (mm)</option>
                            </select>
                        </div>
                    </div>

                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm font-medium text-gray-700">จำนวนหน้า (ถ้ามี)</label>
                            <input type="number" id="pages" placeholder="0" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm border p-2">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700">จำนวนสั่งผลิต</label>
                            <input type="number" id="quantity" placeholder="เช่น 100" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm border p-2" required>
                        </div>
                    </div>
                </div>
            </section>

            <section>
                <h2 class="text-lg font-semibold text-gray-800 border-l-4 border-indigo-500 pl-2 mb-4">2. รายละเอียดวัสดุ</h2>
                <div class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700">ชนิดกระดาษและความหนา</label>
                        <input type="text" id="paper" placeholder="เช่น อาร์ตมัน 160 แกรม" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm border p-2" required>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700">การพิมพ์</label>
                        <select id="printSystem" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm border p-2">
                            <option value="4 สี หน้า-หลัง">4 สี หน้า-หลัง</option>
                            <option value="4 สี หน้าเดียว">4 สี หน้าเดียว</option>
                            <option value="1 สี หน้า-หลัง">1 สี หน้า-หลัง (ขาวดำ)</option>
                            <option value="1 สี หน้าเดียว">1 สี หน้าเดียว (ขาวดำ)</option>
                        </select>
                    </div>
                </div>
            </section>

            <section>
                <h2 class="text-lg font-semibold text-gray-800 border-l-4 border-indigo-500 pl-2 mb-4">3. เทคนิคพิเศษ</h2>
                <div class="grid grid-cols-2 gap-2">
                    <label class="flex items-center space-x-2 text-sm"><input type="checkbox" name="finish" value="เคลือบเงา" class="rounded text-indigo-600"> <span>เคลือบเงา</span></label>
                    <label class="flex items-center space-x-2 text-sm"><input type="checkbox" name="finish" value="เคลือบด้าน" class="rounded text-indigo-600"> <span>เคลือบด้าน</span></label>
                    <label class="flex items-center space-x-2 text-sm"><input type="checkbox" name="finish" value="Spot UV" class="rounded text-indigo-600"> <span>Spot UV</span></label>
                    <label class="flex items-center space-x-2 text-sm"><input type="checkbox" name="finish" value="ปั๊มนูน/ลึก" class="rounded text-indigo-600"> <span>ปั๊มนูน/ลึก</span></label>
                    <label class="flex items-center space-x-2 text-sm"><input type="checkbox" name="finish" value="ไดคัท" class="rounded text-indigo-600"> <span>ไดคัท</span></label>
                </div>
                
                <div class="mt-4">
                    <label class="block text-sm font-medium text-gray-700">การเข้าเล่ม (ถ้ามี)</label>
                    <select id="binding" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm border p-2">
                        <option value="ไม่มี">ไม่มี</option>
                        <option value="ไสกาว">ไสกาว</option>
                        <option value="มุงหลังคา">เย็บมุงหลังคา</option>
                        <option value="พับ">พับ</option>
                    </select>
                </div>
            </section>

            <button type="submit" id="btnSubmit" class="w-full bg-indigo-600 text-white font-bold py-3 px-4 rounded-lg hover:bg-indigo-700 transition duration-200 shadow-md">
                ส่งข้อมูลให้แอดมินประเมินราคา
            </button>
        </form>
    </div>

    <script>
        // --- ส่วนที่ต้องแก้ไข: ใส่ LIFF ID ของคุณที่นี่ ---
        const MY_LIFF_ID = "YOUR_LIFF_ID"; 

        async function main() {
            try {
                await liff.init({ liffId: MY_LIFF_ID });
                if (!liff.isLoggedIn()) {
                    liff.login();
                }
            } catch (err) {
                console.error('LIFF Initialization failed', err);
            }
        }

        main();

        document.getElementById('orderForm').addEventListener('submit', function(e) {
            e.preventDefault();
            handleSubmit();
        });

        async function handleSubmit() {
            const btn = document.getElementById('btnSubmit');
            btn.disabled = true;
            btn.innerText = "กำลังส่งข้อมูล...";

            // รวบรวมข้อมูล
            const workType = document.getElementById('workType').value;
            const size = document.getElementById('size').value;
            const unit = document.getElementById('unit').value;
            const pages = document.getElementById('pages').value || "-";
            const quantity = document.getElementById('quantity').value;
            const paper = document.getElementById('paper').value;
            const printSystem = document.getElementById('printSystem').value;
            const binding = document.getElementById('binding').value;
            
            // รวบรวม Checkbox
            const finishes = [];
            document.querySelectorAll('input[name="finish"]:checked').forEach((checkbox) => {
                finishes.push(checkbox.value);
            });
            const finishText = finishes.length > 0 ? finishes.join(', ') : "ไม่มี";

            // จัด Format ข้อความสำหรับส่งเข้า LINE
            const summaryMsg = `📄 *ขอใบเสนอราคาใหม่*\n` +
                             `------------------\n` +
                             `📌 งาน: ${workType}\n` +
                             `📏 ขนาด: ${size} ${unit}\n` +
                             `📄 จำนวนหน้า: ${pages} หน้า\n` +
                             `📦 จำนวนสั่ง: ${quantity} ชุด\n` +
                             `------------------\n` +
                             `📝 วัสดุ: ${paper}\n` +
                             `🎨 งานพิมพ์: ${printSystem}\n` +
                             `✨ เทคนิค: ${finishText}\n` +
                             `📖 เข้าเล่ม: ${binding}`;

            try {
                if (liff.isInClient()) {
                    await liff.sendMessages([
                        {
                            type: 'text',
                            text: summaryMsg
                        }
                    ]);
                    alert('ส่งข้อมูลเรียบร้อยแล้ว แอดมินจะติดต่อกลับโดยเร็วที่สุด');
                    liff.closeWindow();
                } else {
                    // กรณีเปิดบน Browser ทั่วไป (Debug)
                    console.log(summaryMsg);
                    alert('คุณไม่ได้เปิดผ่าน LINE ข้อมูลจะถูก Log ไว้ใน Console');
                    btn.disabled = false;
                    btn.innerText = "ส่งข้อมูลให้แอดมินประเมินราคา";
                }
            } catch (err) {
                console.error('Error sending message:', err);
                alert('เกิดข้อผิดพลาดในการส่งข้อมูล');
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
